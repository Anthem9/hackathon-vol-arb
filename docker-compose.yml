services:
  postgres:
    image: postgres:16-alpine
    container_name: vol-arb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: volarb
      POSTGRES_USER: volarb
      POSTGRES_PASSWORD: volarb_dev_password
    ports:
      - "55433:5432"
    volumes:
      - volarb-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volarb -d volarb"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  volarb-postgres:
